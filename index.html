<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volleyball Team Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

h1 { margin-bottom: 10px; }

input, select, button {
  padding: 8px;
  margin: 5px 0;
  font-size: 14px;
}

button { cursor: pointer; }

.container {
  display: flex;
  gap: 40px;
  margin-top: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

ul { padding-left: 20px; }

.section {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>🏐 Volleyball Team Generator</h1>

<input type="text" id="name" placeholder="Enter player name">

<select id="skill">
  <option value="Beginner">Beginner</option>
  <option value="Intermediate">Intermediate</option>
  <option value="Advanced">Advanced</option>
</select>

<br>

<button onclick="addPlayer()">➕ Add Player</button>
<button onclick="generateTeams()">⚡ Generate Teams</button>
<button onclick="resetAll()">🗑 Reset</button>

<h3>👥 Player List</h3>
<ul id="playerList"></ul>

<div id="results"></div>

<script>
let players = [];

// Add player
function addPlayer() {
  const name = document.getElementById("name").value.trim();
  const skill = document.getElementById("skill").value;

  if (!name) return alert("Please enter a name.");

  players.push({ name, skill });
  renderPlayers();
  document.getElementById("name").value = "";
}

// Render players
function renderPlayers() {
  const list = document.getElementById("playerList");
  list.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.textContent = `${p.name} (${p.skill})`;
    list.appendChild(li);
  });
}

// Shuffle
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// Split teams
function splitTeams(group) {
  const omega = [];
  const alpha = [];

  group.forEach((player, index) => {
    if (index % 2 === 0) omega.push(player);
    else alpha.push(player);
  });

  return { omega, alpha };
}

// Generate teams (UPDATED LOGIC)
function generateTeams() {
  const results = document.getElementById("results");
  results.innerHTML = "";

  // 🔥 1. BEGINNERS (separate matches only)
  const beginners = shuffle(players.filter(p => p.skill === "Beginner"));

  if (beginners.length > 0) {
    const { omega, alpha } = splitTeams(beginners);

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `
      <h2>🟡 Beginner Match</h2>

      <div class="container">
        <div class="box">
          <h3>🔵 Omega</h3>
          <ul>${omega.map(p => `<li>${p.name}</li>`).join("")}</ul>
        </div>

        <div class="box">
          <h3>🔴 Alpha</h3>
          <ul>${alpha.map(p => `<li>${p.name}</li>`).join("")}</ul>
        </div>
      </div>
    `;

    results.appendChild(section);
  }

  // 🔥 2. INTERMEDIATE + ADVANCED (MIXED)
  const mixed = shuffle(
    players.filter(p => p.skill === "Intermediate" || p.skill === "Advanced")
  );

  if (mixed.length > 0) {
    const { omega, alpha } = splitTeams(mixed);

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `
      <h2>🔵 Intermediate + Advanced Match</h2>

      <div class="container">
        <div class="box">
          <h3>🔵 Omega</h3>
          <ul>${omega.map(p => `<li>${p.name} (${p.skill})</li>`).join("")}</ul>
        </div>

        <div class="box">
          <h3>🔴 Alpha</h3>
          <ul>${alpha.map(p => `<li>${p.name} (${p.skill})</li>`).join("")}</ul>
        </div>
      </div>
    `;

    results.appendChild(section);
  }
}

// Reset
function resetAll() {
  players = [];
  document.getElementById("playerList").innerHTML = "";
  document.getElementById("results").innerHTML = "";
}
</script>

</body>
</html>
